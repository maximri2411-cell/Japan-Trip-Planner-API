<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip | My Journey</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="hero">
    <div class="hero-overlay">
        <div class="hero-content">
            <h1>JAPAN TRIP 2026</h1>
            
            <div class="intro-box">
                <p>ברוכים הבאים ליומן המסע שלי ביפן. האתר הזה נבנה כדי לתעד את המקומות המדהימים שביקרתי בהם, לרכז טיפים חשובים ולתכנן את היעד הבא בארץ השמש העולה.</p>
            </div>

            <div class="hero-btn-container">
                <button id="explore-btn" class="hero-btn">Start Exploring</button>
                <button id="add-new-btn" class="hero-btn">Add New Place</button>
                <button id="tips-btn" class="hero-btn">Tools & Tips</button>
            </div>
        </div>
    </div>
</header>

<main class="container">
    
    <section id="tips-section" class="tips-container">
        <h2 class="section-title">Travel Tips & Tools ⚡️</h2>
        <div class="grid">
            <div class="tool-card">
                <h3>Currency</h3>
                <p>Yen to Shekel</p>
                <button onclick="navigateTo('currency')" class="map-btn">Go to Converter</button>
            </div>
            <div class="tool-card">
                <h3>Translate</h3>
                <p>Language help</p>
                <button onclick="navigateTo('translate')" class="map-btn green-btn">Go to Translate</button>
            </div>
            <div class="tool-card">
                <h3>Hotels</h3>
                <p>Bookings</p>
                <button onclick="navigateTo('hotels')" class="map-btn orange-btn">Bookings</button>
            </div>
        </div>
    </section>

    <section class="filter-section">
        <h2 class="section-title">Filter by City 🏙️</h2>
        <div id="city-filters" class="filter-container">
            <button class="filter-btn active" onclick="filterByCity('all')">All Places</button>
            </div>
    </section>

    <section id="add-section" class="form-card">
        <h2>Add a New Destination 📍</h2>
        <form id="add-location-form">
            <div class="form-group">
                <input type="text" id="name" placeholder="Location Name" required>
                <input type="text" id="city" placeholder="City (Tokyo, Kyoto...)" required>
            </div>
            <textarea id="description" placeholder="What was special about this place?" rows="3"></textarea>
            <button type="submit" id="submit-btn">Save Experience</button>
        </form>
    </section>

    <section id="locations-grid">
        <div id="locations-container" class="grid">
            </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
