<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Trip | My Journey</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Japan Trip 2026</h1>
                <p>Exploring the Land of the Rising Sun</p>
                <button id="explore-btn">Start Exploring</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="stats-summary">
            </section>

        <section id="locations-grid">
            <h2>My Destinations</h2>
            <div id="locations-container" class="grid">
                <p class="loading">Loading your journey...</p>
            </div>
        </section>
    </main>

    <script src="/script.js"></script>
</body>
</html>
