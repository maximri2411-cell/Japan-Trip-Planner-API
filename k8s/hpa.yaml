apiVersion: autoscaling/v2          # API version for autoscaling resources
kind: HorizontalPodAutoscaler       # Watches CPU/memory and scales pods horizontally
metadata:
  name: backend-hpa
  namespace: devops-project
spec:
  scaleTargetRef:                   # Which resource to scale
    apiVersion: apps/v1
    kind: Deployment
    name: backend                   # Points to the backend Deployment specifically

  minReplicas: 2                    # Never scale below 2 pods
  maxReplicas: 5                    # Never scale above 5 pods

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # If average CPU across all pods exceeds 70%, add a pod